<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Jersey+10&family=Lobster&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Pixelify+Sans:wght@400..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Calculator</title>
  </head>
  <body>
    <div class="calculator">
      <div class="screen">
        <div class="display-extra" id="display-extra">0</div>
        <div class="display" id="display">0</div>
      </div>
      <div class="buttons">
        <button class="btn btn-yellow" onclick="clearDisplay()">AC</button>
        <button class="btn btn-yellow" onclick="deleteOne()">C</button>
        <button class="btn btn-yellow" onclick="percent()">%</button>
        <button class="btn btn-orange" onclick="appendOperator('/')">÷</button>

        <button class="btn btn-grey" onclick="appendNumber('7')">7</button>
        <button class="btn btn-grey" onclick="appendNumber('8')">8</button>
        <button class="btn btn-grey" onclick="appendNumber('9')">9</button>
        <button class="btn btn-orange" onclick="appendOperator('*')">×</button>

        <button class="btn btn-grey" onclick="appendNumber('4')">4</button>
        <button class="btn btn-grey" onclick="appendNumber('5')">5</button>
        <button class="btn btn-grey" onclick="appendNumber('6')">6</button>
        <button class="btn btn-orange" onclick="appendOperator('-')">-</button>

        <button class="btn btn-grey" onclick="appendNumber('1')">1</button>
        <button class="btn btn-grey" onclick="appendNumber('2')">2</button>
        <button class="btn btn-grey" onclick="appendNumber('3')">3</button>
        <button class="btn btn-orange" onclick="appendOperator('+')">+</button>

        <button class="btn btn-grey btn-duo" onclick="appendNumber('0')">
          0
        </button>
        <button class="btn btn-grey" onclick="appendNumber('.')">.</button>
        <button class="btn btn-orange" onclick="calculate()">=</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
